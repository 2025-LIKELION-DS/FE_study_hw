<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="center-login">
      <div class="top-logo">
        <img src="../img/logo_light.png" alt="중앙로고" />
      </div>

      <div class="login-set">
        <div>
          <input type="text" class="login-id" placeholder="아이디" />
        </div>
        <div>
          <input type="text" class="login-password" placeholder="비밀번호" />
        </div>
        <div class="login-complete">
          <a class="login-complete-text" href="">에브리타임 로그인</a>
        </div>
      </div>

      <div class="new-member">
        <a href="">회원가입</a>
      </div>
    </div>

    <div class="claim-detail">
      <ul class="claim-line">
        <li>이용약관</li>
        <li><strong>개인정보처리방침</strong></li>
        <li>문의하기</li>
        <li><strong>© 에브리타임</strong></li>
      </ul>
    </div>
  </body>

  <script src="../js/login.js"></script>
</html>
